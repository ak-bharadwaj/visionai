services:
  - type: web
    name: visiontalk
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: INFERENCE_FPS
        value: "10"
      - key: INFERENCE_SIZE
        value: "640"
